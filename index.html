<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Mobile Inventory System</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { max-width: 400px; margin: auto; padding: 20px; background: white; border-radius: 10px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h3>মোবাইল সার্ভিসিং এন্ট্রি</h3>
    <input type="text" id="imei" placeholder="IMEI স্ক্যান করুন বা লিখুন" onchange="autoFillModel()">
    <input type="text" id="model" placeholder="মোবাইলের মডেল">
    
    <select id="problem">
        <option value="">সমস্যা সিলেক্ট করুন</option>
        <option value="Display">ডিসপ্লে সমস্যা (Broken/Blank)</option>
        <option value="Charging">চার্জিং পোর্ট নষ্ট</option>
        <option value="Battery">ব্যাটারি ব্যাকআপ কম</option>
        <option value="Network">নেটওয়ার্ক সমস্যা</option>
        <option value="Software">সফটওয়্যার/হ্যাং সমস্যা</option>
        <option value="Camera">ক্যামেরা সমস্যা</option>
        <option value="Physical">অন্যান্য ফিজিক্যাল ড্যামেজ</option>
    </select>
    
    <input type="text" id="customer" placeholder="কাস্টমারের নাম">
    <input type="text" id="phone" placeholder="কাস্টমার মোবাইল নাম্বার">
    <input type="number" id="price" placeholder="রিপেয়ার খরচ">
    
    <button onclick="window.print()">সেভ ও প্রিন্ট রিসিট</button>
</div>

<script>
    // অটোমেটিক মডেল ডাটাবেস
    const phoneData = {
        "351234567890123": "iPhone 13 Pro",
        "352345678901234": "Samsung Galaxy S22",
        "353456789012345": "Xiaomi Redmi Note 11"
    };

    function autoFillModel() {
        let imei = document.getElementById('imei').value;
        if(phoneData[imei]) {
            document.getElementById('model').value = phoneData[imei];
        } else {
            alert("এই মডেলটি ডাটাবেসে নেই, ম্যানুয়ালি লিখুন।");
        }
    }
</script>

</body>
</html>
