<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>মোবাইল কেয়ার - ইনভেন্টরি</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #eee; padding: 20px; }
        .box { max-width: 500px; background: white; margin: auto; padding: 25px; border-radius: 15px; border: 2px solid #333; }
        .field { margin: 10px 0; }
        input, select { width: 100%; padding: 10px; border: 1px solid #999; }
        button { width: 48%; padding: 12px; border: none; cursor: pointer; color: white; border-radius: 5px; }
        .save-btn { background: #2980b9; }
        .print-btn { background: #27ae60; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="box">
    <h2>📱 মোবাইল কেয়ার (কুটি বাজার)</h2>
    
    <div class="field">
        <label>রেফারেন্স / IMEI (স্ক্যান করুন):</label>
        <input type="text" id="imei" onchange="loadData()" placeholder="স্ক্যান করুন বা লিখুন...">
    </div>

    <div class="field">
        <label>মোবাইল মডেল:</label>
        <input type="text" id="model">
    </div>

    <div class="field">
        <label>কাস্টমার নাম:</label>
        <input type="text" id="cName">
    </div>

    <div class="field">
        <label>ফোন নাম্বার:</label>
        <input type="text" id="cPhone">
    </div>

    <div style="text-align:center;"><svg id="barcode"></svg></div>

    <div class="no-print" style="display:flex; justify-content:space-between; margin-top:20px;">
        <button class="save-btn" onclick="saveData()">সেভ করুন</button>
        <button class="print-btn" onclick="window.print()">প্রিন্ট</button>
    </div>
</div>

<script>
    // তথ্য সেভ করার ফাংশন
    function saveData() {
        let imei = document.getElementById('imei').value;
        let data = {
            model: document.getElementById('model').value,
            name: document.getElementById('cName').value,
            phone: document.getElementById('cPhone').value
        };
        localStorage.setItem(imei, JSON.stringify(data));
        alert("কাস্টমার তথ্য সেভ হয়েছে! IMEI এখন রেফারেন্স হিসেবে কাজ করবে।");
        JsBarcode("#barcode", imei, { format: "CODE128" });
    }

    // তথ্য লোড করার ফাংশন
    function loadData() {
        let imei = document.getElementById('imei').value;
        let savedData = JSON.parse(localStorage.getItem(imei));
        if(savedData) {
            document.getElementById('model').value = savedData.model;
            document.getElementById('cName').value = savedData.name;
            document.getElementById('cPhone').value = savedData.phone;
            JsBarcode("#barcode", imei, { format: "CODE128" });
        } else {
            alert("নতুন কাস্টমার, তথ্য এন্ট্রি করুন।");
        }
    }
</script>
</body>
</html>
