<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>মোবাইল কেয়ার - ইনভেন্টরি</title>
    <link href="https://fonts.googleapis.com/css2?family=SolaimanLipi&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { font-family: 'SolaimanLipi', sans-serif; background: #eee; padding: 20px; }
        .box { max-width: 500px; background: white; margin: auto; padding: 25px; border-radius: 15px; border: 2px solid #333; }
        h2 { text-align: center; color: #d35400; }
        .field { margin: 10px 0; }
        label { font-weight: bold; display: block; }
        input, select { width: 100%; padding: 10px; border: 1px solid #999; }
        button { width: 48%; padding: 12px; border: none; cursor: pointer; color: white; border-radius: 5px; }
        .save-btn { background: #2980b9; }
        .print-btn { background: #27ae60; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="box">
    <h2>📱 মোবাইল কেয়ার</h2>
    <div class="no-print">
        <label>IMEI স্ক্যান করুন:</label>
        <input type="text" id="imei" onchange="autoFill()" placeholder="স্ক্যান করুন...">
    </div>

    <div class="field">
        <label>মোবাইল মডেল:</label>
        <select id="model">
            <option>Samsung A-Series/S-Series</option>
            <option>iPhone (All Models)</option>
            <option>Xiaomi Redmi/Note</option>
            <option>Oppo/Realme</option>
            <option>Vivo/Infinix</option>
            <option>অন্যান্য মডেল</option>
        </select>
    </div>

    <div class="field">
        <label>মোবাইল সমস্যা:</label>
        <select id="problem">
            <option>ডিসপ্লে/টাচ সমস্যা</option>
            <option>চার্জিং পোর্ট মেরামত</option>
            <option>ব্যাটারি পরিবর্তন</option>
            <option>নেটওয়ার্ক সমস্যা</option>
            <option>সফটওয়্যার/লক</option>
            <option>ফোন ডেড/পাওয়ার সমস্যা</option>
        </select>
    </div>

    <div class="field">
        <label>কাস্টমার নাম ও ফোন:</label>
        <input type="text" id="cName" placeholder="নাম">
        <input type="text" id="cPhone" placeholder="ফোন নাম্বার">
    </div>

    <div class="field">
        <label>খরচ (টাকা):</label>
        <input type="number" id="price">
    </div>

    <div style="text-align:center;"><svg id="barcode"></svg></div>

    <div class="footer" style="font-size: 12px; margin-top: 15px;">
        <p><b>টিম অ্যান্ড কন্ডিশন:</b> <br>
        ১. আমাদের সার্ভিসিং এর কোনো প্রকার ওয়ারেন্টি বা গ্যারান্টি নেই।<br>
        ২. ফোন ডেলিভারির সময় ভালোমতো চেক করে নিবেন।<br>
        ৩. রিসিট ছাড়া ফোন গ্রহণ বা দাবি করা যাবে না।</p>
    </div>

    <div class="no-print" style="display:flex; justify-content:space-between;">
        <button class="save-btn" onclick="saveData()">সেভ করুন</button>
        <button class="print-btn" onclick="window.print()">প্রিন্ট করুন</button>
    </div>
</div>

<script>
    function autoFill() {
        let imei = document.getElementById('imei').value;
        JsBarcode("#barcode", imei, { format: "CODE128", width: 2, height: 40 });
    }

    function saveData() {
        alert("আপনার তথ্য ডাটাবেসে সেভ হয়েছে!");
    }
</script>
</body>
</html>
